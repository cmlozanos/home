<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cmlozanos · Proyectos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4f46e5;
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2e2e40;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --radius: 16px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1rem 2rem;
    }
    .hero { text-align: center; margin-bottom: 3rem; }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid var(--accent);
      margin-bottom: 1rem;
    }
    h1 { font-size: 2rem; font-weight: 800; }
    .subtitle { color: var(--muted); margin-top: .4rem; font-size: 1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.2rem;
      width: min(960px, 100%);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: .6rem;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-color, #4f46e5) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .25s;
    }
    .card:hover { border-color: var(--accent-color, #4f46e5); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,.4); }
    .card:hover::before { opacity: .06; }

    .card-icon { font-size: 2rem; }
    .card-title { font-size: 1.1rem; font-weight: 700; }
    .card-desc  { font-size: .85rem; color: var(--muted); line-height: 1.5; flex: 1; }

    .badge {
      align-self: flex-start;
      font-size: .7rem;
      font-weight: 700;
      padding: .2rem .6rem;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent-color, #4f46e5) 20%, transparent);
      color: var(--accent-color, #4f46e5);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: .4rem;
    }
    .status-dot.online  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.offline { background: #ef4444; }
    .status-dot.soon    { background: #f59e0b; }
    .status-label { font-size: .75rem; color: var(--muted); }

    footer { margin-top: 4rem; color: var(--muted); font-size: .8rem; }
  </style>
</head>
<body>
  <div class="hero">
    <img class="avatar" src="https://github.com/cmlozanos.png" alt="cmlozanos" />
    <h1>cmlozanos</h1>
    <p class="subtitle">Proyectos en vivo · Elige uno para empezar</p>
  </div>

  <div class="grid" id="grid">
    <!-- Las tarjetas se renderizan desde apps.js -->
  </div>

  <footer>© 2026 cmlozanos · Todos los proyectos corren localmente vía Cloudflare Tunnel</footer>

  <script src="apps.js"></script>
</body>
</html>
